version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: vulnsecure_db
      POSTGRES_USER: vulnsecure_user
      POSTGRES_PASSWORD: vulnsecure_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vulnsecure-network

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: vulnsecure_db
      DB_USER: vulnsecure_user
      DB_PASSWORD: vulnsecure_password
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRE: 7d
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - vulnsecure-network

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - vulnsecure-network

volumes:
  postgres_data:

networks:
  vulnsecure-network:
    driver: bridge
